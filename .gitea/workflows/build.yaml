name: Release

on:
  push:
    branches:
      - main
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      - name: Build Windows
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -v -o ${{ github.event.repository.name }}-windows-amd64.exe

      - name: Build Linux
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          go build -v -o ${{ github.event.repository.name }}-linux-amd64

      - name: Build macOS (Apple Silicon)
        env:
          GOOS: darwin
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build -v -o ${{ github.event.repository.name }}-darwin-arm64

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ github.event.repository.name }}-windows-amd64.exe
            ${{ github.event.repository.name }}-linux-amd64
            ${{ github.event.repository.name }}-darwin-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete Old Latest Release
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          curl -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "${{ github.api_url }}/repos/${{ github.repository }}/releases/tags/latest" || true

      - name: Update Latest Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: latest
          name: Latest Build
          files: |
            ${{ github.event.repository.name }}-windows-amd64.exe
            ${{ github.event.repository.name }}-linux-amd64
            ${{ github.event.repository.name }}-darwin-arm64
          prerelease: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
